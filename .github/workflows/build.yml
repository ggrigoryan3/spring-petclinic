name: Pipeline
on:
  push:
  # pull_request #
jobs:
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    container: maven:3.8.5-openjdk-17

    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Checkstyle
        run: mvn -B checkstyle:checkstyle
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: "target/reports/checkstyle.html"
    
  test:
    name: Tests
    runs-on: ubuntu-latest
    container: maven:3.8.5-openjdk-17

    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Run tests
        run: mvn test -Dspring.docker.compose.skip.in-tests=true