name: Main Promotion
on:
  push:
    branches:
      - main

jobs:
  promote:
    name: Promote To Main
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get Source SHA
        id: vars
        run: |
          echo "SOURCE_SHA=$(git log -1 --format='%H' HEAD^2)" >> $GITHUB_OUTPUT
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Promote Image
        run: |
          SOURCE_SHA=$(git log -1 --format='%H' HEAD^2)
          
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_USERNAME }}/main:latest \
            --tag ${{ secrets.DOCKER_USERNAME }}/main:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/mr:$SOURCE_SHA