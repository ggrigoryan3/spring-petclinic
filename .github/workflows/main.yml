name: Main Promotion
on:
  push:
    branches:
      - main

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get commit SHA
        id: sha
        run: echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
 
      - name: Promote image to main
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/mr:${{ steps.sha.outputs.sha }}

          docker tag ${{ secrets.DOCKER_USERNAME }}/mr:${{ steps.sha.outputs.sha }} \
                      ${{ secrets.DOCKER_USERNAME }}/main:${{ steps.sha.outputs.sha }}

          docker tag ${{ secrets.DOCKER_USERNAME }}/mr:${{ steps.sha.outputs.sha }} \
                      ${{ secrets.DOCKER_USERNAME }}/main:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/main:${{ steps.sha.outputs.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/main:latest