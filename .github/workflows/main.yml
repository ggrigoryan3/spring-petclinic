name: Main Promotion
on:
  push:
    branches:
        - main

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Promote Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/mr:latest
          
          docker tag ${{ secrets.DOCKER_USERNAME }}/mr:latest ${{ secrets.DOCKER_USERNAME }}/main:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/mr:latest ${{ secrets.DOCKER_USERNAME }}/main:latest
          
          docker push ${{ secrets.DOCKER_USERNAME }}/main:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/main:latest