name: Main Promotion
on:
  push:
    branches:
        - main

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Promote Image
        run: |
          # Pull the exact image built during the PR
          docker pull ${{ secrets.DOCKER_USERNAME }}/mr:${{ github.sha }}
          
          # Re-tag for Main repository
          docker tag ${{ secrets.DOCKER_USERNAME }}/mr:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/main:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/mr:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/main:latest
          
          # Push to Main
          docker push ${{ secrets.DOCKER_USERNAME }}/main:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/main:latest